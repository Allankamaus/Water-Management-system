<!DOCTYPE html>
<html>
<head>
    <title>Complaints - Water System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <a class="logo" href="/static/index.html">Water</a>
            </div>

            <div class="menu">
                <ul>
                    <li><a href="/static/home.html">Home</a></li>
                    <li><a href="/static/about.html">About</a></li>
                    <li><a href="/static/services.html">Services</a></li>
                    <li><a href="/static/connections.html">Connections</a></li>
                    <li><a href="/static/notices.html">Notices</a></li>
                    <li><a href="/static/complaints.html">Complaints</a></li>
                    <li><a href="/static/contact.html">Contact</a></li>
                </ul>
            </div>

            <div class="search">
                <input class="srch" type="search" placeholder="Search...">
                <a href="#"><button class="btn">Search</button></a>
            </div>
        </div>

        <div class="form-wrap">
            <h1>Complaints</h1>
            <form enctype="multipart/form-data">
                <div class="form-group">
                    <label for="complaintMeterId">Meter ID</label>
                    <input class="form-input" id="complaintMeterId" type="text" required>
                </div>

                <div class="form-group">
                    <label for="complaintEmail">Email</label>
                    <input class="form-input" id="complaintEmail" type="email" required>
                </div>

                <div class="form-group">
                    <label for="complaintText">Complaint Details</label>
                    <textarea class="form-input" id="complaintText" required></textarea>
                </div>

                <div class="form-group">
                    <label for="complaintPhoto">Add Photo (optional)</label>
                    <input class="form-input" id="complaintPhoto" type="file" accept="image/*">
                </div>

                <button class="form-action" type="submit">Submit Complaint</button>
            </form>
        </div>

        <footer class="footer"></footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Water System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <a class="logo" href="/static/index.html">Water</a>
            </div>

            <div class="menu">
                <ul>
                    <li><a href="/static/home.html">Home</a></li>
                    <li><a href="/static/about.html">About</a></li>
                    <li><a href="/static/services.html">Services</a></li>
                    <li><a href="/static/connections.html">Connections</a></li>
                    <li><a href="/static/notices.html">Notices</a></li>
                    <li><a href="/static/complaints.html">Complaints</a></li>
                    <li><a href="/static/contact.html">Contact</a></li>
                </ul>
            </div>

            <div class="search">
                <input class="srch" type="search" placeholder="Search...">
                <a href="#"><button class="btn">Search</button></a>
            </div>
        </div>

        <div class="form-wrap">
            <h1>Sign Up</h1>
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input class="form-input" id="name" type="text" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input class="form-input" id="email" type="email" required>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input class="form-input" id="username" type="text" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input class="form-input" id="password" type="password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input class="form-input" id="confirmPassword" type="password" required>
                </div>

                <button class="form-action" type="submit">Create Account</button>
            </form>

            <p class="form-note">Already have an account? <a href="/static/login.html">Log In</a></p>
        </div>

        <footer class="footer"></footer>
    </div>
</body>
</html>
